<?xml version="1.0" encoding="UTF-8"?>
<!--
  AMPER · Mark · Blue (transparent background)
  The core symbol — sine wave + spark endpoint
  Use this for inline contexts: headers, navbar, footer, in-text mentions
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B4FD8" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#2D8CFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="200" cy="120" r="34" fill="url(#glow)"/>

  <path d="M 30 120
           C 60 120, 60 60, 90 60
           C 120 60, 120 180, 150 180
           C 180 180, 180 120, 200 120"
        stroke="url(#wave)" stroke-width="13"
        stroke-linecap="round" fill="none"/>

  <circle cx="200" cy="120" r="11" fill="#7C3AED"/>
  <circle cx="200" cy="120" r="4.5" fill="#FFFFFF"/>
</svg>
